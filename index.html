<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Responsive Restaurant Website using HTML and CSS">
    <meta name="keywords" content="Restaurant Website, HTML CSS Project">

    <title>HealthyHub</title>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <nav class="navbar" aria-label="Main Navigation">

            <div class="navbar-container container">
                <input type="checkbox" name="checkbox" id="box" aria-label="Toggle Navigation Menu">

                <div class="hamburger-lines">
                    <span class="line line1"></span>
                    <span class="line line2"></span>
                    <span class="line line3"></span>
                </div>

                <ul class="menu-items">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#food">Category</a></li>
                    <li><a href="#food-menu">Menu</a></li>
                    <li><a href="#testimonials">Testimonial</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>

                <h1 class="logo">HealthyHub</h1>

            </div>

        </nav>
    </header>

    <main>

        <section class="showcase-area" id="home">

            <div class="showcase-container">
                <h1 class="main-title">Fresh Food, Healthy Life</h1>
                <p>Nutritious meals made fresh for a better you.</p>
                <a href="#food-menu" class="btn btn-primary">Menu</a>
            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
